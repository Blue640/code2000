<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booting BlueOS...</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: monospace; }

        /* Экран CMD */
        #boot-cmd { color: #ccc; padding: 20px; font-size: 14px; display: block; }
        
        /* Экран Vista */
        #boot-vista { 
            display: none; 
            height: 100%; 
            background: black; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* Полоска загрузки Vista */
        .vista-loader {
            width: 150px;
            height: 12px;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        .vista-progress {
            width: 30px;
            height: 100%;
            background: linear-gradient(90deg, #001a33, #00d4ff, #001a33);
            position: absolute;
            animation: vista-slide 2s infinite linear;
        }
        @keyframes vista-slide {
            from { left: -40px; }
            to { left: 150px; }
        }

        /* Рабочий стол */
        #desktop {
            display: none;
            height: 100%;
            background-color: #008080; /* Классика */
            justify-content: center;
            align-items: center;
        }

        /* Окно Блокнота */
        .notepad {
            width: 90%; max-width: 800px; height: 80vh;
            background: #f0f0f0;
            border: 2px solid; border-color: #fff #808080 #808080 #fff;
            display: flex; flex-direction: column;
            box-shadow: 4px 4px 20px rgba(0,0,0,0.5);
        }
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white; padding: 3px 6px; display: flex;
            justify-content: space-between; align-items: center; font-size: 13px;
        }
        .content {
            flex-grow: 1; background: #fff; margin: 2px;
            border: 2px inset #fff; padding: 15px;
            overflow-y: scroll; font-family: "Lucida Console", monospace;
            white-space: pre-wrap; color: #000;
        }
    </style>
</head>
<body>

    <div id="boot-cmd"></div>

    <div id="boot-vista">
        <div class="vista-loader">
            <div class="vista-progress"></div>
        </div>
        <p style="color: #fff; font-size: 10px; margin-top: 20px; letter-spacing: 2px;">© Microsoft Corporation</p>
    </div>

    <div id="desktop">
        <div class="notepad">
            <div class="title-bar">
                <span>🗒️ poem.txt — Блокнот</span>
                <span style="background:#d4d0c8; color:#000; padding:0 5px; border:1px solid #fff;">X</span>
            </div>
            <div id="text-area" class="content">Чтение данных...</div>
        </div>
    </div>

    <script>
        const cmd = document.getElementById('boot-cmd');
        const vista = document.getElementById('boot-vista');
        const desktop = document.getElementById('desktop');
        const textArea = document.getElementById('text-area');

        const log = [
            "BlueOS (TM) v1.0.12.09",
            "Checking RAM... 512MB OK",
            "Mounting Drive C: (Poetry Partition)",
            "Found: poem.txt [2001-09-12]",
            "Initializing graphical shell..."
        ];

        // Звук писка
        function beep() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.15);
        }

        // Логика загрузки
        let i = 0;
        function showCmd() {
            if (i < log.length) {
                cmd.innerHTML += `<div>${log[i]}</div>`;
                i++;
                setTimeout(showCmd, 400);
            } else {
                setTimeout(() => {
                    beep();
                    cmd.style.display = 'none';
                    vista.style.display = 'flex';
                    setTimeout(showDesktop, 3000); // Vista висит 3 сек
                }, 500);
            }
        }

        async function showDesktop() {
            vista.style.display = 'none';
            desktop.style.display = 'flex';
            try {
                const response = await fetch('poem.txt');
                const text = await response.text();
                textArea.innerText = text;
            } catch (e) {
                textArea.innerText = "Ошибка: создай poem.txt в репозитории!";
            }
        }

        window.onload = showCmd;
    </script>
</body>
</html>
