<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue // Код 2000х</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --dark-bg: #00050a;
            --glass-cyan: rgba(0, 212, 255, 0.1);
        }

        body, html {
            background-color: var(--dark-bg);
            color: #e0f7fa;
            font-family: "Tahoma", "Verdana", sans-serif;
            margin: 0;
            cursor: crosshair;
        }

        /* Загрузка */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            color: var(--neon-blue);
            font-family: "Courier New", monospace;
            padding: 20px;
            z-index: 1000;
        }

        /* Основной интерфейс */
        .wrapper {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            border: 2px solid var(--neon-blue);
            background: var(--glass-cyan);
            padding: 15px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .window {
            background: #c0c0c0; /* Классический серый Windows */
            border: 3px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            color: #000;
            margin-bottom: 20px;
        }

        .window-title {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 4px 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-content {
            padding: 20px;
            background: #fff;
            margin: 4px;
            border: 2px inset #fff;
            min-height: 300px;
            white-space: pre-wrap; /* Сохраняет переносы строк из файла */
            font-size: 16px;
            line-height: 1.5;
        }

        footer {
            text-align: center;
            font-size: 10px;
            color: var(--neon-blue);
            margin-top: 50px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="loader">
    <div id="log"></div>
</div>

<div class="wrapper" id="main">
    <header>
        <h1 style="margin:0; letter-spacing: 5px;">КОД 2000х</h1>
        <small>PROJECT BY BLUE</small>
    </header>

    <div class="window">
        <div class="window-title">
            <span>POEM_READER.EXE</span>
            <span style="font-family: Arial;">[?] [X]</span>
        </div>
        <div id="poem-content" class="window-content">Загрузка данных из системы...</div>
    </div>

    <footer>
        System: GitHub Pages // Status: Online // User: Blue
    </footer>
</div>

<script>
    const logElement = document.getElementById('log');
    const poemElement = document.getElementById('poem-content');
    
    // 1. Функция загрузки текста
    async function fetchPoem() {
        try {
            // Файл должен лежать в той же папке на GitHub
            const response = await fetch('poem.txt');
            if (!response.ok) throw new Error('Файл не найден');
            const text = await response.text();
            poemElement.innerText = text;
        } catch (err) {
            poemElement.innerText = "ОШИБКА: Не удалось найти файл poem.txt в репозитории.";
        }
    }

    // 2. Имитация загрузки
    const steps = [
        "> Инициализация BlueOS...",
        "> Проверка связи с сервером...",
        "> Чтение сектора 12.09.2001...",
        "> Подключение к poem.txt...",
        "> ГОТОВО."
    ];

    let currentStep = 0;
    const interval = setInterval(() => {
        if (currentStep < steps.length) {
            logElement.innerHTML += `<div>${steps[currentStep]}</div>`;
            currentStep++;
        } else {
            clearInterval(interval);
            setTimeout(async () => {
                await fetchPoem(); // Подтягиваем текст перед показом
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main').style.display = 'block';
            }, 1000);
        }
    }, 500);
</script>

</body>
</html>
