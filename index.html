<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блокнот — poem.txt</title>
    <style>
        body {
            background-color: #008080; /* Тот самый классический бирюзовый цвет рабочего стола */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: "Tahoma", sans-serif;
        }

        /* Окно Блокнота */
        .notepad {
            width: 90%;
            max-width: 800px;
            height: 80vh;
            background: #f0f0f0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        /* Заголовок окна */
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 13px;
        }

        .title-bar-text {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .controls img { width: 14px; height: 14px; cursor: pointer; }

        /* Меню блокнота */
        .menu-bar {
            display: flex;
            gap: 10px;
            padding: 2px 10px;
            font-size: 12px;
            border-bottom: 1px solid #808080;
        }

        .menu-bar span::first-letter { text-decoration: underline; }

        /* Текстовое поле */
        .content {
            flex-grow: 1;
            background: #fff;
            margin: 2px;
            border: 2px inset #fff;
            padding: 10px;
            overflow-y: scroll;
            font-family: "Lucida Console", "Courier New", monospace;
            font-size: 14px;
            line-height: 1.4;
            color: #000;
            white-space: pre-wrap;
        }

        /* Скроллбар в стиле Win98/XP */
        .content::-webkit-scrollbar { width: 16px; background: #f0f0f0; }
        .content::-webkit-scrollbar-thumb { 
            background: #d4d0c8; 
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
        }
    </style>
</head>
<body>

    <div class="notepad">
        <div class="title-bar">
            <div class="title-bar-text">
                <span>🗒️ poem.txt — Блокнот</span>
            </div>
            <div class="controls">
                <span style="border: 1px solid #fff; padding: 0 5px; background: #d4d0c8; color: #000; font-size: 10px;">?</span>
                <span style="border: 1px solid #fff; padding: 0 5px; background: #d4d0c8; color: #000; font-size: 10px;">X</span>
            </div>
        </div>
        
        <div class="menu-bar">
            <span>Файл</span>
            <span>Правка</span>
            <span>Формат</span>
            <span>Вид</span>
            <span>Справка</span>
        </div>

        <div id="text-area" class="content">Загрузка текста...</div>
    </div>

    <script>
        async function loadText() {
            const textArea = document.getElementById('text-area');
            try {
                // Подтягиваем твой poem.txt из репозитория
                const response = await fetch('poem.txt');
                if (!response.ok) throw new Error();
                const text = await response.text();
                textArea.innerText = text;
            } catch (e) {
                textArea.innerText = "Ошибка: Не удалось открыть файл poem.txt. Проверьте, что он лежит в корне репозитория.";
            }
        }

        loadText();
    </script>
</body>
</html>
