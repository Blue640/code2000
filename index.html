<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booting BlueOS...</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: monospace; }

        /* –≠–ļ—Ä–į–Ĺ CMD */
        #boot-cmd { color: #ccc; padding: 20px; font-size: 14px; display: block; line-height: 1.5; }
        
        /* –≠–ļ—Ä–į–Ĺ Vista */
        #boot-vista { 
            display: none; 
            height: 100%; 
            background: black; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* –ü–ĺ–Ľ–ĺ—Ā–ļ–į –∑–į–≥—Ä—É–∑–ļ–ł Vista */
        .vista-loader {
            width: 150px;
            height: 12px;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        .vista-progress {
            width: 30px;
            height: 100%;
            background: linear-gradient(90deg, #001a33, #00d4ff, #001a33);
            position: absolute;
            animation: vista-slide 2s infinite linear;
        }
        @keyframes vista-slide {
            from { left: -40px; }
            to { left: 150px; }
        }

        /* –†–į–Ī–ĺ—á–ł–Ļ —Ā—ā–ĺ–Ľ */
        #desktop {
            display: none;
            height: 100%;
            background-color: #008080;
            justify-content: center;
            align-items: center;
        }

        /* –ě–ļ–Ĺ–ĺ –Ď–Ľ–ĺ–ļ–Ĺ–ĺ—ā–į */
        .notepad {
            width: 95%; max-width: 900px; height: 85vh;
            background: #f0f0f0;
            border: 2px solid; border-color: #fff #808080 #808080 #fff;
            display: flex; flex-direction: column;
            box-shadow: 4px 4px 20px rgba(0,0,0,0.5);
        }
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white; padding: 3px 6px; display: flex;
            justify-content: space-between; align-items: center; font-size: 13px;
        }
        .content {
            flex-grow: 1; background: #fff; margin: 2px;
            border: 2px inset #fff; padding: 15px;
            overflow-y: scroll; font-family: "Lucida Console", monospace;
            white-space: pre-wrap; color: #000; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="boot-cmd"></div>

    <div id="boot-vista">
        <div class="vista-loader">
            <div class="vista-progress"></div>
        </div>
        <p style="color: #fff; font-size: 10px; margin-top: 20px; letter-spacing: 2px;">¬© Blue Corporation</p>
    </div>

    <div id="desktop">
        <div class="notepad">
            <div class="title-bar">
                <span>ūüóíÔłŹ poem.txt ‚ÄĒ –Ď–Ľ–ĺ–ļ–Ĺ–ĺ—ā</span>
                <span style="background:#d4d0c8; color:#000; padding:0 5px; border:1px solid #fff; cursor:pointer;">X</span>
            </div>
            <div id="text-area" class="content"></div>
        </div>
    </div>

    <script>
        const cmd = document.getElementById('boot-cmd');
        const vista = document.getElementById('boot-vista');
        const desktop = document.getElementById('desktop');
        const textArea = document.getElementById('text-area');

        // –£–ī–Ľ–ł–Ĺ–Ķ–Ĺ–Ĺ—č–Ļ –Ľ–ĺ–≥ –∑–į–≥—Ä—É–∑–ļ–ł
        const log = [
            "BlueOS (TM) BIOS v1.0.12.09",
            "Copyright (C) 2001-2026, Blue Corp.",
            " ",
            "CPU: AMD Athlon(tm) II X4 640 Processor",
            "Speed: 3.00 GHz",
            "Memory Test: 524288K OK",
            " ",
            "Detecting primary master ... IDE Hard Disk",
            "Detecting primary slave  ... None",
            " ",
            "Mounting Poetry Partition [C:] ... DONE",
            "Searching for boot sectors ... FOUND",
            "Loading poem.txt kernel ... DONE",
            "Initializing graphical shell ...",
            "Starting system services ..."
        ];

        const asciiArt = `
<span style="color:#add8e6">      ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ¬∑ ‚ĖĄ‚ĖĄ‚ĖĆ  ‚ĖĄ‚ÄĘ ‚ĖĄ‚ĖĆ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ</span>
<span style="color:#add8e6">      ‚Ėź‚Ėą ‚ĖÄ‚Ėą‚Ė™‚Ėą‚Ėą‚ÄĘ  ‚Ėą‚Ė™‚Ėą‚Ėą‚ĖĆ‚ÄĘ‚Ėą‚Ėą  </span>
<span style="color:#00ffff">      ‚Ėź‚Ėą‚ĖÄ‚ĖÄ‚Ėą‚ĖĄ‚Ėą‚Ėą‚Ė™  ‚Ėą‚ĖĆ‚Ėź‚Ėą‚ĖĆ ‚Ėź‚Ėą.‚Ė™</span>
<span style="color:#00ffff">      ‚Ėą‚Ėą‚ĖĄ‚Ė™‚Ėź‚Ėą‚Ėź‚Ėą‚ĖĆ‚Ėź‚ĖĆ‚Ėź‚Ėą‚ĖĄ‚Ėą‚ĖĆ ‚Ėź‚Ėą‚ĖĆ¬∑</span>
<span style="color:#e0ffff">      ¬∑‚ĖÄ‚ĖÄ‚ĖÄ‚ĖÄ .‚ĖÄ‚ĖÄ‚ĖÄ  ‚ĖÄ‚ĖÄ‚ĖÄ  ‚ĖÄ‚ĖÄ‚ĖÄ </span>
<hr style="border:0; border-top:1px dashed #00ffff; margin:15px 0;">`;

        function beep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch(e) {}
        }

        let line = 0;
        function showCmd() {
            if (line < log.length) {
                cmd.innerHTML += `<div>${log[line]}</div>`;
                line++;
                // –ó–į–ī–Ķ—Ä–∂–ļ–į –ľ–Ķ–∂–ī—É —Ā—ā—Ä–ĺ–ļ–į–ľ–ł —É–≤–Ķ–Ľ–ł—á–Ķ–Ĺ–į –ī–Ľ—Ź —ć—Ą—Ą–Ķ–ļ—ā–į –ī–ĺ–Ľ–≥–ĺ–Ļ –∑–į–≥—Ä—É–∑–ļ–ł
                setTimeout(showCmd, 350); 
            } else {
                setTimeout(() => {
                    beep();
                    cmd.style.display = 'none';
                    vista.style.display = 'flex';
                    setTimeout(showDesktop, 4000); // Vista –≤–ł—Ā–ł—ā 4 —Ā–Ķ–ļ—É–Ĺ–ī—č
                }, 1000);
            }
        }

        function typeWriter(text, i, cb) {
            if (i < text.length) {
                if (text[i] === '<') {
                    let tagEnd = text.indexOf('>', i);
                    textArea.innerHTML += text.substring(i, tagEnd + 1);
                    typeWriter(text, tagEnd + 1, cb);
                } else {
                    textArea.innerHTML += text[i];
                    // –°–ļ–ĺ—Ä–ĺ—Ā—ā—Ć –Ņ–Ķ—á–į—ā–ł: 1–ľ—Ā –ī–Ľ—Ź –Ī—č—Ā—ā—Ä–ĺ–≥–ĺ, –Ĺ–ĺ –∑–į–ľ–Ķ—ā–Ĺ–ĺ–≥–ĺ –Ņ–ĺ—Ź–≤–Ľ–Ķ–Ĺ–ł—Ź
                    setTimeout(() => typeWriter(text, i + 1, cb), 1); 
                }
            } else if (cb) {
                cb();
            }
        }

        async function showDesktop() {
            vista.style.display = 'none';
            desktop.style.display = 'flex';
            
            // –°–Ĺ–į—á–į–Ľ–į –Ņ–Ķ—á–į—ā–į–Ķ–ľ –ź—Ä—ā
            typeWriter(asciiArt, 0, async () => {
                try {
                    const response = await fetch('poem.txt');
                    const text = await response.text();
                    textArea.innerHTML += "\n";
                    // –ó–į—ā–Ķ–ľ –Ņ–Ķ—á–į—ā–į–Ķ–ľ —Ā–į–ľ —Ā—ā–ł—Ö
                    typeWriter(text, 0);
                } catch (e) {
                    textArea.innerHTML += "\n[System Error: poem.txt not found]";
                }
            });
        }

        window.onload = showCmd;
    </script>
</body>
</html>
