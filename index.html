<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booting BlueOS...</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: monospace; }
        
        /* Экран для обхода блокировки звука */
        #start-screen {
            height: 100%; display: flex; justify-content: center; align-items: center;
            flex-direction: column; color: #ADD8E6; cursor: pointer; text-align: center;
        }

        #boot-cmd { color: #ccc; padding: 20px; font-size: 14px; display: none; line-height: 1.5; }
        
        #boot-vista { 
            display: none; height: 100%; background: black; 
            flex-direction: column; justify-content: center; align-items: center; 
        }
        .vista-loader {
            width: 150px; height: 12px; border: 1px solid #333;
            position: relative; overflow: hidden; background: #000;
        }
        .vista-progress {
            width: 30px; height: 100%;
            background: linear-gradient(90deg, #001a33, #00d4ff, #001a33);
            position: absolute; animation: vista-slide 2s infinite linear;
        }
        @keyframes vista-slide { from { left: -40px; } to { left: 150px; } }
        
        #desktop { display: none; height: 100%; background-color: #008080; justify-content: center; align-items: center; }
        .notepad {
            width: 95%; max-width: 900px; height: 85vh;
            background: #f0f0f0; border: 2px solid; 
            border-color: #fff #808080 #808080 #fff;
            display: flex; flex-direction: column; box-shadow: 4px 4px 20px rgba(0,0,0,0.5);
        }
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white; padding: 3px 6px; display: flex;
            justify-content: space-between; align-items: center; font-size: 13px;
        }
        .content {
            flex-grow: 1; background: #fff; margin: 2px;
            border: 2px inset #fff; padding: 15px;
            overflow-y: scroll; font-family: "Lucida Console", "Courier New", monospace;
            white-space: pre-wrap; color: #000; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="startSystem()">
        <p style="font-size: 20px;">Привет! Спасибо что заглянул)</p>
        <p>Нажмите в любом месте для загрузки / Убавьте громкость!</p>
    </div>

    <div id="boot-cmd"></div>

    <div id="boot-vista">
        <div class="vista-loader"><div class="vista-progress"></div></div>
        <p style="color: #fff; font-size: 10px; margin-top: 20px; letter-spacing: 2px;">© Blue Corporation</p>
    </div>

    <div id="desktop">
        <div class="notepad">
            <div class="title-bar">
                <span>Блокнот</span>
                <span style="background:#d4d0c8; color:#000; padding:0 5px; border:1px solid #fff; cursor:pointer;">X</span>
            </div>
            <div id="text-area" class="content"></div>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const cmd = document.getElementById('boot-cmd');
        const vista = document.getElementById('boot-vista');
        const desktop = document.getElementById('desktop');
        const textArea = document.getElementById('text-area');

        // Создаем аудио-объект
        const music = new Audio('music.mp3');
        music.volume = 0.6;

        const log = [
            "BlueOS (TM) BIOS v1.0.12.09",
            "Copyright (C) 2001-2026, Blue Corp.",
            " ",
            "CPU: AMD Athlon(tm) II X4 640 Processor",
            "Memory Test: 524288K OK",
            "Detecting primary master ... IDE Hard Disk",
            "Mounting Poetry Partition [C:] ... DONE",
            "Loading poem.txt kernel ... DONE",
            "Initializing graphical shell ...",
            "Starting system services ..."
        ];

        const asciiArt = `
<span style="color:#add8e6">   ____   _         _   _  _____ </span>
<span style="color:#add8e6">  |  _ \\ | |       | | | ||  ___|</span>
<span style="color:#00ffff">  | |_) || |       | | | || |__  </span>
<span style="color:#00ffff">  |  _ < | |       | | | ||  __| </span>
<span style="color:#e0ffff">  | |_) || |____   | |_| || |___ </span>
<span style="color:#e0ffff">  |____/ |______|   \\___/ |_____|</span>
<hr style="border:0; border-top:1px dashed #00ffff; margin:15px 0;">`;

        function startSystem() {
            startScreen.style.display = 'none';
            cmd.style.display = 'block';
            showCmd();
        }

        let line = 0;
        function showCmd() {
            if (line < log.length) {
                cmd.innerHTML += `<div>${log[line]}</div>`;
                line++;
                setTimeout(showCmd, 300); 
            } else {
                setTimeout(() => {
                    // ВКЛЮЧАЕМ МУЗЫКУ ЗДЕСЬ
                    music.play().catch(e => console.error("Ошибка аудио:", e));
                    
                    cmd.style.display = 'none';
                    vista.style.display = 'flex';
                    setTimeout(showDesktop, 4000); 
                }, 1000);
            }
        }

        function typeWriter(text, i, cb) {
            if (i < text.length) {
                if (text[i] === '<') {
                    let tagEnd = text.indexOf('>', i);
                    textArea.innerHTML += text.substring(i, tagEnd + 1);
                    typeWriter(text, tagEnd + 1, cb);
                } else {
                    textArea.innerHTML += text[i];
                    setTimeout(() => typeWriter(text, i + 1, cb), 1); 
                }
            } else if (cb) { cb(); }
        }

        async function showDesktop() {
            vista.style.display = 'none';
            desktop.style.display = 'flex';
            typeWriter(asciiArt, 0, async () => {
                try {
                    const response = await fetch('poem.txt');
                    const text = await response.text();
                    textArea.innerHTML += "\n";
                    typeWriter(text, 0);
                } catch (e) { 
                    textArea.innerHTML += "\n[System Message: Ready for input]"; 
                }
            });
        }
    </script>
</body>
</html>
